steps:
- task: PowerShell@2
  inputs:
    targetType: filePath
    filePath: $(System.DefaultWorkingDirectory)\versionnumber.ps1
    arguments: $(Build.SourcesDirectory) $(semanticVersion) $(Build.BuildId) $$(isPrerelease)
  displayName: 'Setting build version'

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'env | sort'
  displayName: 'Display environment variables'

# Ensure .NET Framework 4.8.1 Developer Pack is installed for GuiLogin project
- task: PowerShell@2
  displayName: 'Install .NET Framework 4.8.1 Developer Pack'
  inputs:
    targetType: 'inline'
    script: |
      $installerUrl = "https://go.microsoft.com/fwlink/?linkid=2203306"
      $installerPath = "$env:TEMP\ndp481-devpack-enu.exe"

      # Check if targeting pack is already installed
      $targetingPack = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full" -ErrorAction SilentlyContinue
      if ($targetingPack -and [int]$targetingPack.Release -ge 533320) {
        Write-Host ".NET Framework 4.8.1 or higher is already installed"
        exit 0
      }

      Write-Host "Downloading .NET Framework 4.8.1 Developer Pack..."
      Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath

      Write-Host "Installing .NET Framework 4.8.1 Developer Pack..."
      Start-Process -FilePath $installerPath -ArgumentList "/quiet", "/norestart" -Wait

      Write-Host "Installation complete"

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet tools'

# Restore .NET Framework projects via NuGet.exe (packages.config style)
- task: NuGetCommand@2
  displayName: 'Restore NuGet packages for .NET Framework projects'
  inputs:
    restoreSolution: '$(msbuildProjects)'

# Restore the SDK-style SafeguardDotNet project separately via dotnet CLI,
# because Framework projects (GuiLogin) have a ProjectReference to it and
# MSBuild needs project.assets.json present when building.
- task: DotNetCoreCLI@2
  displayName: 'Restore SafeguardDotNet (SDK-style dependency)'
  inputs:
    command: 'restore'
    projects: '**/SafeguardDotNet/SafeguardDotNet.csproj'

# Resolve the x86 Windows SDK signtool path dynamically.
# eSignerCKA's PKCS#11 DLL is 32-bit only, so only the x86 signtool can access the private key.
- powershell: |
    $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
        Where-Object { $_.FullName -match "\\x86\\" } |
        Sort-Object -Property FullName -Descending |
        Select-Object -First 1
    if ($signtool) {
        Write-Host "Found x86 signtool at: $($signtool.FullName)"
        Write-Host "##vso[task.setvariable variable=SignToolPath]$($signtool.FullName)"
    } else {
        Write-Host "##vso[task.logissue type=warning]x86 signtool.exe not found in Windows SDK, falling back to ClickOnce SDK"
        Write-Host "##vso[task.setvariable variable=SignToolPath]C:\Program Files (x86)\Microsoft SDKs\ClickOnce\SignTool\signtool.exe"
    }
  displayName: 'Resolve x86 Windows SDK signtool path'

# Build the older .NET Framework projects using MSBuild (before .NET 10 SDK is installed)
- task: MSBuild@1
  displayName: 'Build all .NET Framework projects'
  inputs:
    solution: '$(msbuildProjects)'
    msbuildArchitecture: 'x64'
    configuration: '$(buildConfiguration)'
    msbuildArguments: '/p:SignFiles=$(signFiles) /p:SignToolPath="$(SignToolPath)" /p:CertThumbprint=$(CertThumbprint)'

# Now install .NET SDK 10.0 for building the modern .NET projects
- task: UseDotNet@2
  displayName: 'Install .NET SDK 10.0.x'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

# Build the modern dotnet projects (dotnet CLI handles its own restore)
- task: DotNetCoreCLI@2
  displayName: 'Build all .NET projects'
  inputs:
    command: 'build'
    projects: '$(dotnetProjects)'
    arguments: '--configuration $(buildConfiguration) /p:SignFiles=$(signFiles) /p:SignToolPath="$(SignToolPath)" /p:CertThumbprint=$(CertThumbprint)'

# Verify code signatures on built DLLs when signing is enabled
- powershell: |
    $ErrorActionPreference = "Stop"
    $failed = @()
    $verified = 0
    $dlls = Get-ChildItem -Path "$(Build.SourcesDirectory)" -Recurse -Filter "OneIdentity.SafeguardDotNet*.dll" |
        Where-Object { $_.FullName -match "\\bin\\$(buildConfiguration)\\" -and $_.FullName -notmatch "\\ref\\" }
    if ($dlls.Count -eq 0) {
        throw "No OneIdentity.SafeguardDotNet DLLs found to verify"
    }
    foreach ($dll in $dlls) {
        $sig = Get-AuthenticodeSignature -FilePath $dll.FullName
        if ($sig.Status -ne "Valid") {
            Write-Host "##vso[task.logissue type=error]FAILED: $($dll.FullName) - Status: $($sig.Status) - $($sig.StatusMessage)"
            $failed += $dll.FullName
        } else {
            Write-Host "VERIFIED: $($dll.FullName) - Signed by: $($sig.SignerCertificate.Subject)"
            $verified++
        }
    }
    Write-Host "$verified of $($dlls.Count) DLLs verified successfully"
    if ($failed.Count -gt 0) {
        throw "$($failed.Count) DLL(s) failed signature verification"
    }
  condition: eq(variables['signFiles'], 'true')
  displayName: 'Verify code signatures on built DLLs'

# Package the SDK and BrowserLogin projects into NuGet packages using dotnet CLI
- task: DotNetCoreCLI@2
  inputs:
    command: 'custom'
    custom: 'pack'
    arguments: '$(Build.SourcesDirectory)\SafeguardDotNet\SafeguardDotNet.csproj --configuration $(buildConfiguration) --include-symbols -p:SymbolPackageFormat=snupkg --output $(Build.ArtifactStagingDirectory) --no-build --verbosity detailed'
  displayName: Building SafeguardDotNet NuGet packages

- task: DotNetCoreCLI@2
  inputs:
    command: 'custom'
    custom: 'pack'
    arguments: '$(Build.SourcesDirectory)\SafeguardDotNet.BrowserLogin\SafeguardDotNet.BrowserLogin.csproj --configuration $(buildConfiguration) --include-symbols -p:SymbolPackageFormat=snupkg --output $(Build.ArtifactStagingDirectory) --no-build --verbosity detailed'
  displayName: Building SafeguardDotNet.BrowserLogin NuGet packages

- task: DotNetCoreCLI@2
  inputs:
    command: 'custom'
    custom: 'pack'
    arguments: '$(Build.SourcesDirectory)\SafeguardDotNet.PkceNoninteractiveLogin\SafeguardDotNet.PkceNoninteractiveLogin.csproj --configuration $(buildConfiguration) --include-symbols -p:SymbolPackageFormat=snupkg --output $(Build.ArtifactStagingDirectory) --no-build --verbosity detailed'
  displayName: Building SafeguardDotNet.PkceNoninteractiveLogin NuGet packages

# Package GuiLogin separately using Nuget since it targets .NET Framework and has a nuspec
- task: NuGetCommand@2
  inputs:
    command: 'custom'
    arguments: 'pack $(Build.SourcesDirectory)\SafeguardDotNet.GuiLogin\SafeguardDotNet.GuiLogin.nuspec -Properties Configuration=$(buildConfiguration) -Symbols -SymbolPackageFormat snupkg -OutputDirectory $(Build.ArtifactStagingDirectory) -Verbosity detailed -NonInteractive'
  displayName: Building SafeguardDotNet.GuiLogin NuGet packages

# Sign NuGet packages using NuGet.exe sign with eSignerCKA certificate.
# Using NuGet.exe instead of dotnet nuget sign because dotnet is 64-bit and
# cannot access eSignerCKA's 32-bit PKCS#11 private key.
# Per SSL.com guidance, NuGet signing requires the legacy timestamp endpoint.
- powershell: |
    $ErrorActionPreference = "Stop"
    # Get the SHA-256 fingerprint from the certificate (NuGet sign requires SHA-256+)
    $cert = Get-ChildItem Cert:\CurrentUser\My | Where-Object { $_.Thumbprint -eq "$(CertThumbprint)" }
    if (-not $cert) {
        throw "Certificate with thumbprint $(CertThumbprint) not found in CurrentUser\My"
    }
    $sha256Bytes = $cert.GetCertHash("SHA256")
    $sha256Fingerprint = ($sha256Bytes | ForEach-Object { $_.ToString("x2") }) -join ""
    Write-Host "SHA-256 fingerprint: $sha256Fingerprint"

    $nugetExe = (Get-Command nuget.exe).Source
    Write-Host "Using NuGet.exe: $nugetExe"

    $nupkgs = Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)" -Filter "*.nupkg"
    if ($nupkgs.Count -eq 0) {
        throw "No .nupkg files found in $(Build.ArtifactStagingDirectory)"
    }
    Write-Host "Found $($nupkgs.Count) NuGet package(s) to sign"
    foreach ($nupkg in $nupkgs) {
        Write-Host "`nSigning: $($nupkg.Name)"
        & $nugetExe sign $nupkg.FullName `
            -CertificateFingerprint $sha256Fingerprint `
            -CertificateStoreName My `
            -CertificateStoreLocation CurrentUser `
            -Timestamper http://ts.ssl.com/legacy `
            -HashAlgorithm SHA256 `
            -TimestampHashAlgorithm SHA256 `
            -Verbosity detailed `
            -NonInteractive `
            -Overwrite
        if ($LASTEXITCODE -ne 0) {
            throw "NuGet sign failed for $($nupkg.Name) with exit code $LASTEXITCODE"
        }
        Write-Host "Successfully signed: $($nupkg.Name)"
    }
  condition: eq(variables['signFiles'], 'true')
  displayName: 'Sign NuGet packages'

# Verify NuGet package signatures
- powershell: |
    $ErrorActionPreference = "Stop"
    $nupkgs = Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)" -Filter "*.nupkg"
    $failed = @()
    $verified = 0
    foreach ($nupkg in $nupkgs) {
        Write-Host "`nVerifying: $($nupkg.Name)"
        nuget verify -Signature $nupkg.FullName -Verbosity detailed -NonInteractive
        if ($LASTEXITCODE -ne 0) {
            Write-Host "##vso[task.logissue type=error]FAILED: $($nupkg.Name) - nuget verify returned exit code $LASTEXITCODE"
            $failed += $nupkg.Name
        } else {
            Write-Host "VERIFIED: $($nupkg.Name)"
            $verified++
        }
    }
    Write-Host "`n$verified of $($nupkgs.Count) NuGet package(s) verified successfully"
    if ($failed.Count -gt 0) {
        throw "$($failed.Count) NuGet package(s) failed signature verification:`n$($failed -join "`n")"
    }
  condition: eq(variables['signFiles'], 'true')
  displayName: 'Verify NuGet package signatures'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'SafeguardDotNet'
  displayName: 'Publishing the artifacts'
